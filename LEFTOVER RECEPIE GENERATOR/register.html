<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Leftover Recipe Generator</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Immediate guest-only redirect check to avoid content flash -->
    <script>
        if (localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>
    <div class="auth-wrapper" style="min-height: 100vh; padding: 3rem 1rem;">
        <div class="auth-card" style="max-width: 500px;">
            <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                🍳 <span>Leftover <strong>Recipe</strong></span>
            </div>
            
            <h2 class="auth-card-title">Create Account</h2>
            
            <!-- Dynamic feedback message box -->
            <div id="auth-feedback" class="feedback-message"></div>

            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="john@example.com" required autocomplete="email">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="Min. 6 chars" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input type="password" id="reg-confirm-password" placeholder="Confirm" required autocomplete="new-password">
                    </div>
                </div>

                <!-- Profile Custom Default Preferences (Gourmet style add-on) -->
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Dietary Preferences (Default)</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-label">
                            <input type="checkbox" id="reg-pref-halal"> Halal
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="reg-pref-vegetarian"> Vegetarian
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="reg-pref-vegan"> Vegan
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="reg-pref-glutenfree"> Gluten-Free
                        </label>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem; margin-bottom: 1.8rem;">
                    <label>Allergen Exclusions (Default)</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-label">
                            <input type="checkbox" name="reg-allergy" value="egg"> Egg
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="reg-allergy" value="dairy"> Dairy
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="reg-allergy" value="gluten"> Gluten
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="reg-allergy" value="soy"> Soy
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="reg-allergy" value="seafood"> Seafood
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="reg-allergy" value="nuts"> Nuts
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Register Account
                </button>
            </form>
            
            <p class="auth-card-sub">
                Already have an account? <a href="login.html">Log in here</a>
            </p>
        </div>
    </div>

    <!-- Load the auth controller module -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
